<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smart Task Tracker - Mobile Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        body { margin: 0; padding: 0; background: #E9F1F9; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2B5BA9; border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        .slide-in { animation: slideIn 0.3s ease-out; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
            .stat-card { padding: 16px !important; }
            .stat-card p { font-size: 18px !important; }
            .quick-entry { flex-direction: column !important; }
            .quick-entry select, .quick-entry button { width: 100% !important; }
            .trend-bars { gap: 6px !important; }
        }
        
        /* Prevent body scroll when menu is open */
        body.menu-open { overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Icons
        const Menu = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const X = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const LayoutDashboard = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>;
        const ClipboardList = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14h6"/><path d="M12 17h6"/><path d="M9 11h6"/></svg>;
        const History = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const Settings = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const PlusCircle = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const Activity = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Calendar = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const ChevronDown = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const TrendingUp = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Trash2 = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Edit = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>;
        const Download = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Upload = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const Database = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const Bell = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
        const Search = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;

        // Utility functions - defined ONCE at the top level
        const formatDate = (timestamp) => {
            if (!timestamp) return '--';
            return new Date(timestamp).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        };

        const formatDateTime = (timestamp) => {
            if (!timestamp) return '--';
            return new Date(timestamp).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };

        // Fixed: Proper pluralization including zero
        const formatDays = (num) => {
            // Handle null/undefined
            if (num === null || num === undefined) return '--';
            
            // Parse and round the number
            const parsedNum = parseFloat(num);
            if (isNaN(parsedNum)) return '--';
            
            const roundedNum = Math.round(parsedNum);
            
            // Handle zero - returns "0 days"
            if (roundedNum === 0) return '----';
            
            // Handle singular/plural
            return `${roundedNum} ${roundedNum === 1 ? 'day' : 'days'}`;
        };

        const CATEGORIES = [
            { name: 'Car Maintenance', color: 'bg-blue-500', text: 'text-blue-500' },
            { name: 'House Chores', color: 'bg-orange-500', text: 'text-orange-500' },
            { name: 'Pet Care', color: 'bg-green-500', text: 'text-green-500' },
            { name: 'Personal', color: 'bg-purple-500', text: 'text-purple-500' },
        ];

        const CharacterAvatar = ({ className }) => (
            <svg viewBox="0 0 100 100" className={className}>
                <circle cx="50" cy="45" r="30" fill="#A17452" />
                <path d="M20 45 C 20 15, 80 15, 80 45" fill="black" />
                <circle cx="40" cy="45" r="4" fill="white" />
                <circle cx="40" cy="45" r="2" fill="black" />
                <circle cx="60" cy="45" r="4" fill="white" />
                <circle cx="60" cy="45" r="2" fill="black" />
                <path d="M42 60 Q 50 65 58 60" fill="none" stroke="#633F25" strokeWidth="2" strokeLinecap="round" />
            </svg>
        );

        const StatCard = ({ label, value, highlight, warning }) => (
            <div className={`stat-card p-4 md:p-6 rounded-2xl border-2 shadow-sm transition-all ${highlight ? 'bg-[#2B5BA9] border-[#2B5BA9] text-white' : warning ? 'bg-red-50 border-red-200' : 'bg-white border-slate-100'}`}>
                <h4 className={`text-[10px] font-black uppercase tracking-widest mb-2 ${highlight ? 'text-white/50' : warning ? 'text-red-600' : 'text-slate-400'}`}>{label}</h4>
                <p className={`text-lg md:text-xl font-black ${!highlight && !warning ? 'text-[#1E3A8A]' : warning ? 'text-red-600' : ''}`}>{value || '--'}</p>
            </div>
        );

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('taskTracker_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('taskTracker_logs');
                return saved ? JSON.parse(saved) : [];
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedTaskForLog, setSelectedTaskForLog] = useState('');
            const [tutorialStep, setTutorialStep] = useState(() => {
                const saved = localStorage.getItem('taskTracker_tutorial');
                return saved ? JSON.parse(saved) : 0;
            });
            const [showTutorial, setShowTutorial] = useState(() => {
                const saved = localStorage.getItem('taskTracker_showTutorial');
                return saved !== null ? JSON.parse(saved) : true;
            });
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isLogEditModalOpen, setIsLogEditModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [editingLog, setEditingLog] = useState(null);
            const [newTaskName, setNewTaskName] = useState('');
            const [newTaskCategory, setNewTaskCategory] = useState(CATEGORIES[0].name);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [historyFilter, setHistoryFilter] = useState('all');
            const [sortOrder, setSortOrder] = useState('newest');
            const [editLogDate, setEditLogDate] = useState('');
            const [editLogTime, setEditLogTime] = useState('');
            const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Close mobile menu when screen size changes to desktop
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 768 && isMobileMenuOpen) {
                        setIsMobileMenuOpen(false);
                        document.body.classList.remove('menu-open');
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [isMobileMenuOpen]);

            // Prevent body scroll when mobile menu is open
            useEffect(() => {
                if (isMobileMenuOpen) {
                    document.body.classList.add('menu-open');
                } else {
                    document.body.classList.remove('menu-open');
                }
            }, [isMobileMenuOpen]);

            // Check for overdue tasks
            const stats = useMemo(() => {
                return tasks.map(task => {
                    const taskLogs = logs
                        .filter(l => l.task_id === task.id)
                        .sort((a, b) => b.timestamp - a.timestamp);
                    
                    const lastDone = taskLogs[0]?.timestamp || null;
                    
                    let avgInterval = 0;
                    let intervals = [];
                    if (taskLogs.length >= 2) {
                        for (let i = 0; i < taskLogs.length - 1; i++) {
                            const interval = (taskLogs[i].timestamp - taskLogs[i+1].timestamp) / (1000 * 60 * 60 * 24);
                            intervals.push(interval);
                        }
                        avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                    }

                    const predictedNext = lastDone && avgInterval > 0 
                        ? lastDone + (avgInterval * 24 * 60 * 60 * 1000)
                        : null;

                    const daysSince = lastDone 
                        ? Math.floor((new Date().getTime() - lastDone) / (1000 * 60 * 60 * 24))
                        : 0;
                        
                    const isOverdue = predictedNext && new Date().getTime() > predictedNext;

                    return { 
                        ...task, 
                        lastDone, 
                        avgInterval: avgInterval.toFixed(1), 
                        predictedNext, 
                        daysSince, 
                        logCount: taskLogs.length,
                        isOverdue,
                        intervals
                    };
                });
            }, [tasks, logs]);

            useEffect(() => {
                const checkOverdueTasks = () => {
                    const overdueTasks = stats.filter(s => s.isOverdue && s.logCount > 0);
                    const newNotifications = overdueTasks.map(task => ({
                        id: task.id,
                        taskName: task.name,
                        daysOverdue: Math.floor((new Date().getTime() - task.predictedNext) / (1000 * 60 * 60 * 24))
                    }));
                    setNotifications(newNotifications);
                    
                    if (newNotifications.length > 0 && Notification.permission === 'granted') {
                        newNotifications.forEach(notif => {
                            new Notification(`Task Overdue: ${notif.taskName}`, {
                                body: `${notif.daysOverdue} days overdue!`,
                            });
                        });
                    }
                };
                
                checkOverdueTasks();
                const interval = setInterval(checkOverdueTasks, 3600000);
                if (Notification.permission === 'default') Notification.requestPermission();
                return () => clearInterval(interval);
            }, [stats]);

            useEffect(() => {
                localStorage.setItem('taskTracker_tasks', JSON.stringify(tasks));
                localStorage.setItem('taskTracker_logs', JSON.stringify(logs));
                localStorage.setItem('taskTracker_tutorial', JSON.stringify(tutorialStep));
                localStorage.setItem('taskTracker_showTutorial', JSON.stringify(showTutorial));
            }, [tasks, logs, tutorialStep, showTutorial]);

            const currentStats = stats.find(s => s.id === parseInt(selectedTaskForLog)) || null;

            const getRealTrendData = () => {
                if (!selectedTaskForLog) return [];
                const taskStats = stats.find(s => s.id === parseInt(selectedTaskForLog));
                if (!taskStats || taskStats.intervals.length === 0) return [];
                const maxInterval = Math.max(...taskStats.intervals, 1);
                return taskStats.intervals.slice(0, 7).map(interval => ({
                    height: (interval / maxInterval) * 70
                }));
            };

            const handleCreateTask = (e) => {
                e.preventDefault();
                if (!newTaskName.trim()) return;
                const newTask = { id: Date.now(), name: newTaskName, category: newTaskCategory };
                setTasks([...tasks, newTask]);
                if (tasks.length === 0) setSelectedTaskForLog(newTask.id);
                setIsTaskModalOpen(false);
                setNewTaskName('');
                if (tutorialStep === 1) setTutorialStep(2);
            };

            const handleEditTask = (e) => {
                e.preventDefault();
                if (!editingTask) return;
                const updatedTasks = tasks.map(t => t.id === editingTask.id ? { ...t, name: newTaskName, category: newTaskCategory } : t);
                setTasks(updatedTasks);
                setIsEditModalOpen(false);
                setEditingTask(null);
            };

            const handleEditLog = (log) => {
                const date = new Date(log.timestamp);
                setEditingLog(log);
                setEditLogDate(date.toISOString().split('T')[0]);
                setEditLogTime(date.toTimeString().slice(0, 5));
                setIsLogEditModalOpen(true);
            };

            const saveEditedLog = (e) => {
                e.preventDefault();
                if (!editingLog) return;
                const newTimestamp = new Date(`${editLogDate}T${editLogTime}`).getTime();
                setLogs(logs.map(l => l.id === editingLog.id ? { ...l, timestamp: newTimestamp } : l));
                setIsLogEditModalOpen(false);
                setEditingLog(null);
            };

            const handleDeleteTask = (taskId) => {
                if (window.confirm('Delete this template and all its logs?')) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                    setLogs(logs.filter(l => l.task_id !== taskId));
                    if (selectedTaskForLog == taskId) setSelectedTaskForLog(tasks.find(t => t.id !== taskId)?.id || '');
                }
            };

            const handleDeleteLog = (logId) => {
                if (window.confirm('Delete this log entry?')) setLogs(logs.filter(l => l.id !== logId));
            };

            const handleAddEntry = () => {
                if (!selectedTaskForLog) return;
                const newLog = { id: Date.now(), task_id: parseInt(selectedTaskForLog), timestamp: new Date().getTime() };
                setLogs([newLog, ...logs]);
                if (tutorialStep === 2) { setTutorialStep(3); setTimeout(() => setShowTutorial(false), 5000); }
            };

            const exportData = () => {
                const data = { tasks, logs, exportDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `task-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.tasks && data.logs) { setTasks(data.tasks); setLogs(data.logs); alert('Imported successfully!'); }
                        else alert('Invalid file format');
                    } catch (error) { alert('Error parsing file'); }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const resetAllData = () => {
                if (window.confirm('WARNING: This will delete ALL data. Cannot be undone.')) {
                    setTasks([]); setLogs([]); setSelectedTaskForLog(''); setShowResetConfirm(false);
                    alert('All data reset');
                }
            };

            const filteredHistory = useMemo(() => {
                let filtered = [...logs];
                if (historyFilter !== 'all') filtered = filtered.filter(l => l.task_id === parseInt(historyFilter));
                filtered.sort((a, b) => sortOrder === 'newest' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);
                return filtered;
            }, [logs, historyFilter, sortOrder]);

            const filteredTemplates = useMemo(() => {
                if (!searchTerm) return stats;
                return stats.filter(t => t.name.toLowerCase().includes(searchTerm.toLowerCase()) || t.category.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [stats, searchTerm]);

            // Navigation items
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: <LayoutDashboard size={20} /> },
                { id: 'templates', label: 'My Templates', icon: <ClipboardList size={20} /> },
                { id: 'history', label: 'History', icon: <History size={20} /> },
                { id: 'settings', label: 'Settings', icon: <Settings size={20} /> }
            ];

            const DashboardView = () => (
                <>
                    {/* Notification Bell */}
                    <div className="fixed top-4 right-16 md:right-4 z-40">
                        <button onClick={() => setShowNotifications(!showNotifications)} className="relative bg-white p-2 md:p-3 rounded-full shadow-lg">
                            <Bell size={20} className="text-[#2B5BA9]" />
                            {notifications.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">{notifications.length}</span>}
                        </button>
                        {showNotifications && notifications.length > 0 && (
                            <div className="absolute right-0 mt-2 w-72 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden z-50">
                                <div className="p-3 bg-red-50 border-b border-red-100"><h4 className="font-black text-red-600 text-sm">Overdue Tasks</h4></div>
                                <div className="max-h-80 overflow-y-auto">
                                    {notifications.map(notif => {

                    <DesktopSidebar />

                    <main className="flex-1 overflow-y-auto">
                        <div className="max-w-6xl mx-auto p-4 md:p-8 lg:p-12 pt-16 md:pt-8">
                            <div className="mb-6 md:mb-10">
                                <h1 className="text-2xl md:text-3xl font-black text-[#1E3A8A] tracking-tight uppercase">
                                    {activeTab === 'dashboard' && 'Dashboard'}
                                    {activeTab === 'templates' && 'My Templates'}
                                    {activeTab === 'history' && 'History'}
                                    {activeTab === 'settings' && 'Settings'}
                                </h1>
                                <p className="text-xs md:text-sm text-[#64748B] font-bold mt-1">
                                    {activeTab === 'dashboard' && 'Monitor your recurring activities with Task Tracker'}
                                    {activeTab === 'templates' && 'Manage your task templates'}
                                    {activeTab === 'history' && 'View all task logs'}
                                    {activeTab === 'settings' && 'Configure app settings'}
                                </p>
                            </div>

                            {activeTab === 'dashboard' && showTutorial && (
                                <div className="mb-6 md:mb-10 p-1 bg-gradient-to-r from-orange-400 to-blue-400 rounded-2xl">
                                    <div className="bg-white rounded-xl p-4 md:p-6 flex items-center gap-4 flex-wrap">
                                        <CharacterAvatar className="w-12 h-12 md:w-16 md:h-16" />
                                        <div className="flex-1">
                                            <h2 className="text-base md:text-xl font-black text-[#1E3A8A]">
                                                {tutorialStep === 0 && "Welcome!"}
                                                {tutorialStep === 1 && "Create a Template"}
                                                {tutorialStep === 2 && "Log Your First Entry"}
                                                {tutorialStep === 3 && "Great Job!"}
                                            </h2>
                                            <p className="text-xs text-slate-500">
                                                {tutorialStep === 0 && "Click Get Started to begin"}
                                                {tutorialStep === 1 && "Add something like 'Water Plants'"}
                                                {tutorialStep === 2 && "Select your task and click Add Entry"}
                                                {tutorialStep === 3 && "The system will learn your patterns!"}
                                            </p>
                                        </div>
                                        {tutorialStep === 0 && <button onClick={() => setTutorialStep(1)} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold">Get Started →</button>}
                                        <button onClick={() => setShowTutorial(false)} className="text-slate-300 text-xs">Hide</button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'templates' && <TemplatesView />}
                            {activeTab === 'history' && <HistoryView />}
                            {activeTab === 'settings' && <SettingsView />}
                        </div>
                    </main>

                    {isTaskModalOpen && <TaskModal />}
                    {isEditModalOpen && <EditTaskModal />}
                    {showResetConfirm && <ResetModal />}
                    {isLogEditModalOpen && <LogEditModal />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
