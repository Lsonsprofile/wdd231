<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Task Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        body { margin: 0; padding: 0; background: #f5f0e8; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #e8e0d5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c4a77d; border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        .slide-in { animation: slideIn 0.3s ease-out; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @media (max-width: 768px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
            .stat-card { padding: 16px !important; }
            .stat-card p { font-size: 18px !important; }
            .trend-bars { gap: 6px !important; }
        }
        
        body.menu-open { overflow: hidden; }
        
        .avatar-upload {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .avatar-upload:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        
        .empty-bar {
            background: repeating-linear-gradient(
                45deg,
                #e8e0d5,
                #e8e0d5 10px,
                #d5ccbf 10px,
                #d5ccbf 20px
            );
        }
        
        .stat-value-large {
            font-size: 2rem;
            font-weight: 800;
        }
        
        @media (min-width: 768px) {
            .stat-value-large {
                font-size: 2.5rem;
            }
        }
        
        /* Bar animation */
        .bar-fill {
            transition: height 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Icons (same as before, shortened for space)
        const Menu = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const X = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const LayoutDashboard = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>;
        const ClipboardList = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14h6"/><path d="M12 17h6"/><path d="M9 11h6"/></svg>;
        const History = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const Settings = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const PlusCircle = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const Activity = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Calendar = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const ChevronDown = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const TrendingUp = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Trash2 = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Edit = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>;
        const Download = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Upload = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const Database = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const Bell = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
        const Search = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const Camera = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;

        // Utility functions
        const formatDate = (timestamp) => {
            if (!timestamp) return '--';
            return new Date(timestamp).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        };

        const formatDateTime = (timestamp) => {
            if (!timestamp) return '--';
            return new Date(timestamp).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };

        const formatDays = (num) => {
            if (num === null || num === undefined) return '--';
            const parsedNum = parseFloat(num);
            if (isNaN(parsedNum)) return '--';
            const roundedNum = Math.round(parsedNum);
            if (roundedNum === 0) return '0 days';
            return `${roundedNum} ${roundedNum === 1 ? 'day' : 'days'}`;
        };

        const CATEGORIES = [
            { name: 'Car Maintenance', color: '#c4a77d', bg: 'bg-[#c4a77d]' },
            { name: 'House Chores', color: '#a0845c', bg: 'bg-[#a0845c]' },
            { name: 'Pet Care', color: '#8b7355', bg: 'bg-[#8b7355]' },
            { name: 'Personal', color: '#d4b896', bg: 'bg-[#d4b896]' },
        ];

        const CharacterAvatar = ({ className, imageData }) => {
            if (imageData) {
                return <img src={imageData} alt="Avatar" className={`rounded-full object-cover ${className}`} />;
            }
            return (
                <svg viewBox="0 0 100 100" className={className} fill="#c4a77d">
                    <circle cx="50" cy="50" r="45" fill="#e8dcc8" />
                    <circle cx="50" cy="40" r="20" fill="#d4b896" />
                    <circle cx="38" cy="38" r="3" fill="#5c3a1e" />
                    <circle cx="62" cy="38" r="3" fill="#5c3a1e" />
                    <path d="M42 55 Q 50 62 58 55" fill="none" stroke="#8b7355" strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M35 48 Q 30 45 25 48" fill="none" stroke="#8b7355" strokeWidth="2" strokeLinecap="round" />
                    <path d="M65 48 Q 70 45 75 48" fill="none" stroke="#8b7355" strokeWidth="2" strokeLinecap="round" />
                </svg>
            );
        };

        const StatCard = ({ label, value, highlight, warning }) => (
            <div className={`p-4 md:p-5 rounded-xl border shadow-sm transition-all ${highlight ? 'bg-[#2c4a2e] border-[#3d5c3f] text-white' : warning ? 'bg-red-50 border-red-200' : 'bg-white border-[#e8e0d5]'}`}>
                <h4 className={`text-[11px] font-black uppercase tracking-wider mb-1 ${highlight ? 'text-white/60' : warning ? 'text-red-600' : 'text-[#8b7355]'}`}>{label}</h4>
                <p className={`text-xl md:text-2xl font-black tracking-tight ${!highlight && !warning ? 'text-[#2c3e2f]' : warning ? 'text-red-600' : ''}`}>{value || '--'}</p>
            </div>
        );

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('taskTracker_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('taskTracker_logs');
                return saved ? JSON.parse(saved) : [];
            });
            const [avatarImage, setAvatarImage] = useState(() => {
                const saved = localStorage.getItem('taskTracker_avatar');
                return saved || null;
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedTaskForLog, setSelectedTaskForLog] = useState('');
            const [tutorialStep, setTutorialStep] = useState(() => {
                const saved = localStorage.getItem('taskTracker_tutorial');
                return saved ? JSON.parse(saved) : 0;
            });
            const [showTutorial, setShowTutorial] = useState(() => {
                const saved = localStorage.getItem('taskTracker_showTutorial');
                return saved !== null ? JSON.parse(saved) : true;
            });
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isLogEditModalOpen, setIsLogEditModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [editingLog, setEditingLog] = useState(null);
            const [newTaskName, setNewTaskName] = useState('');
            const [newTaskCategory, setNewTaskCategory] = useState(CATEGORIES[0].name);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [historyFilter, setHistoryFilter] = useState('all');
            const [sortOrder, setSortOrder] = useState('newest');
            const [editLogDate, setEditLogDate] = useState('');
            const [editLogTime, setEditLogTime] = useState('');
            const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [forceUpdate, setForceUpdate] = useState(0);
            const fileInputRef = useRef(null);

            // Auto-update days elapsed every minute
            useEffect(() => {
                const interval = setInterval(() => {
                    setForceUpdate(prev => prev + 1);
                }, 60000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 768 && isMobileMenuOpen) {
                        setIsMobileMenuOpen(false);
                        document.body.classList.remove('menu-open');
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [isMobileMenuOpen]);

            useEffect(() => {
                if (isMobileMenuOpen) {
                    document.body.classList.add('menu-open');
                } else {
                    document.body.classList.remove('menu-open');
                }
            }, [isMobileMenuOpen]);

            // Calculate stats with real-time days since
            const stats = useMemo(() => {
                const now = new Date().getTime();
                return tasks.map(task => {
                    const taskLogs = logs
                        .filter(l => l.task_id === task.id)
                        .sort((a, b) => b.timestamp - a.timestamp);
                    
                    const lastDone = taskLogs[0]?.timestamp || null;
                    
                    let avgInterval = 0;
                    let intervals = [];
                    if (taskLogs.length >= 2) {
                        for (let i = 0; i < taskLogs.length - 1; i++) {
                            const interval = (taskLogs[i].timestamp - taskLogs[i+1].timestamp) / (1000 * 60 * 60 * 24);
                            intervals.push(interval);
                        }
                        avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                    }

                    const predictedNext = lastDone && avgInterval > 0 
                        ? lastDone + (avgInterval * 24 * 60 * 60 * 1000)
                        : null;

                    const daysSince = lastDone 
                        ? Math.floor((now - lastDone) / (1000 * 60 * 60 * 24))
                        : 0;
                        
                    const isOverdue = predictedNext && now > predictedNext;

                    return { 
                        ...task, 
                        lastDone, 
                        avgInterval: avgInterval.toFixed(1), 
                        predictedNext, 
                        daysSince, 
                        logCount: taskLogs.length,
                        isOverdue,
                        intervals
                    };
                });
            }, [tasks, logs, forceUpdate]);

            useEffect(() => {
                const checkOverdueTasks = () => {
                    const overdueTasks = stats.filter(s => s.isOverdue && s.logCount > 0);
                    const newNotifications = overdueTasks.map(task => ({
                        id: task.id,
                        taskName: task.name,
                        daysOverdue: Math.floor((new Date().getTime() - task.predictedNext) / (1000 * 60 * 60 * 24))
                    }));
                    setNotifications(newNotifications);
                    
                    if (newNotifications.length > 0 && Notification.permission === 'granted') {
                        newNotifications.forEach(notif => {
                            new Notification(`Task Overdue: ${notif.taskName}`, {
                                body: `${notif.daysOverdue} days overdue!`,
                            });
                        });
                    }
                };
                
                checkOverdueTasks();
                const interval = setInterval(checkOverdueTasks, 3600000);
                if (Notification.permission === 'default') Notification.requestPermission();
                return () => clearInterval(interval);
            }, [stats]);

            useEffect(() => {
                localStorage.setItem('taskTracker_tasks', JSON.stringify(tasks));
                localStorage.setItem('taskTracker_logs', JSON.stringify(logs));
                localStorage.setItem('taskTracker_tutorial', JSON.stringify(tutorialStep));
                localStorage.setItem('taskTracker_showTutorial', JSON.stringify(showTutorial));
                if (avatarImage) {
                    localStorage.setItem('taskTracker_avatar', avatarImage);
                }
            }, [tasks, logs, tutorialStep, showTutorial, avatarImage]);

            const currentStats = stats.find(s => s.id === parseInt(selectedTaskForLog)) || null;

            // Get chart data - shows intervals between completions
            const getChartData = () => {
                if (!selectedTaskForLog) return [];
                const taskStats = stats.find(s => s.id === parseInt(selectedTaskForLog));
                if (!taskStats || taskStats.intervals.length === 0) return [];
                
                // Get the intervals (days between completions)
                const intervals = taskStats.intervals;
                const maxInterval = Math.max(...intervals, 1);
                
                // Create bars for each interval
                return intervals.map((interval, index) => ({
                    days: interval,
                    height: (interval / maxInterval) * 70,
                    label: `Completion ${index + 1} to ${index + 2}`
                }));
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setAvatarImage(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleCreateTask = (e) => {
                e.preventDefault();
                if (!newTaskName.trim()) return;
                const newTask = { id: Date.now(), name: newTaskName, category: newTaskCategory };
                setTasks([...tasks, newTask]);
                if (tasks.length === 0) setSelectedTaskForLog(newTask.id);
                setIsTaskModalOpen(false);
                setNewTaskName('');
                if (tutorialStep === 1) setTutorialStep(2);
            };

            const handleEditTask = (e) => {
                e.preventDefault();
                if (!editingTask) return;
                const updatedTasks = tasks.map(t => t.id === editingTask.id ? { ...t, name: newTaskName, category: newTaskCategory } : t);
                setTasks(updatedTasks);
                setIsEditModalOpen(false);
                setEditingTask(null);
            };

            const handleEditLog = (log) => {
                const date = new Date(log.timestamp);
                setEditingLog(log);
                setEditLogDate(date.toISOString().split('T')[0]);
                setEditLogTime(date.toTimeString().slice(0, 5));
                setIsLogEditModalOpen(true);
            };

            const saveEditedLog = (e) => {
                e.preventDefault();
                if (!editingLog) return;
                const newTimestamp = new Date(`${editLogDate}T${editLogTime}`).getTime();
                setLogs(logs.map(l => l.id === editingLog.id ? { ...l, timestamp: newTimestamp } : l));
                setIsLogEditModalOpen(false);
                setEditingLog(null);
            };

            const handleDeleteTask = (taskId) => {
                if (window.confirm('Delete this template and all its logs?')) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                    setLogs(logs.filter(l => l.task_id !== taskId));
                    if (selectedTaskForLog == taskId) setSelectedTaskForLog(tasks.find(t => t.id !== taskId)?.id || '');
                }
            };

            const handleDeleteLog = (logId) => {
                if (window.confirm('Delete this log entry?')) setLogs(logs.filter(l => l.id !== logId));
            };

            const handleAddEntry = () => {
                if (!selectedTaskForLog) return;
                const newLog = { id: Date.now(), task_id: parseInt(selectedTaskForLog), timestamp: new Date().getTime() };
                setLogs([newLog, ...logs]);
                if (tutorialStep === 2) { setTutorialStep(3); setTimeout(() => setShowTutorial(false), 5000); }
            };

            const exportData = () => {
                const data = { tasks, logs, avatarImage, exportDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `task-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.tasks && data.logs) { 
                            setTasks(data.tasks); 
                            setLogs(data.logs);

            const HamburgerButton = () => (
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden fixed top-4 left-4 z-50 bg-[#c4a77d] text-white p-2.5 rounded-xl shadow-lg">
                    {isMobileMenuOpen ? <X size={22} /> : <Menu size={22} />}
                </button>
            );

            const MobileSidebar = () => (
                <div className={`fixed inset-0 z-40 md:hidden ${isMobileMenuOpen ? 'visible' : 'invisible'}`}>
                    <div className={`absolute inset-0 bg-black/50 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMobileMenuOpen(false)}></div>
                    <div className={`absolute left-0 top-0 bottom-0 w-64 bg-[#c4a77d] shadow-2xl transition-transform duration-300 ease-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 flex justify-center pt-16"><div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center p-1 overflow-hidden"><CharacterAvatar className="w-full h-full" imageData={avatarImage} /></div></div>
                        <nav className="px-3 space-y-1">{navItems.map(item => (<button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-black text-xs uppercase ${activeTab === item.id ? 'bg-white text-[#c4a77d] shadow-lg' : 'text-white/70 hover:bg-white/10'}`}>{item.icon}<span>{item.label}</span></button>))}</nav>
                        <div className="absolute bottom-6 left-6 right-6"><div className="bg-white/10 p-4 rounded-xl"><p className="text-[9px] text-white/50 font-black uppercase tracking-wider">Status</p><p className="text-sm text-white font-bold flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>{tasks.length} Active Templates</p></div></div>
                    </div>
                </div>
            );

            const DesktopSidebar = () => (
                <aside className="hidden md:flex w-64 bg-[#c4a77d] flex-col shadow-xl flex-shrink-0">
                    <div className="p-8 flex justify-center"><div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center p-1 overflow-hidden cursor-pointer hover:opacity-80 transition-opacity" onClick={() => fileInputRef.current?.click()}><CharacterAvatar className="w-full h-full" imageData={avatarImage} /></div></div>
                    <nav className="flex-1 px-4 space-y-1">
                        {navItems.map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-black text-xs uppercase ${activeTab === item.id ? 'bg-white text-[#c4a77d] shadow-lg' : 'text-white/70 hover:bg-white/10'}`}>
                                {item.icon}<span>{item.label}</span>
                            </button>
                        ))}
                    </nav>
                    <div className="p-6"><div className="bg-white/10 p-4 rounded-xl"><p className="text-[9px] text-white/50 font-black uppercase tracking-wider">Status</p><p className="text-sm text-white font-bold flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>{tasks.length} Active Templates</p></div></div>
                </aside>
            );

            const TaskModal = () => (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsTaskModalOpen(false)}>
                    <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden animate-in" onClick={e => e.stopPropagation()}>
                        <div className="p-6 bg-[#f5f0e8] border-b border-[#e8e0d5] flex justify-between items-center"><div><h3 className="text-xl font-black text-[#2c3e2f]">New Template</h3><p className="text-xs text-[#a0845c]">Define what you want to track</p></div><button onClick={() => setIsTaskModalOpen(false)} className="text-[#a0845c] hover:text-[#2c3e2f] text-2xl">✕</button></div>
                        <form onSubmit={handleCreateTask} className="p-6 space-y-5"><div><input autoFocus required placeholder="e.g., Fill Gas, Change Oil" value={newTaskName} onChange={(e) => setNewTaskName(e.target.value)} className="w-full bg-[#f5f0e8] border-2 border-[#e8e0d5] rounded-xl px-5 py-3.5 outline-none focus:border-[#c4a77d] text-[#2c3e2f] placeholder:text-[#c4a77d]/50" /></div>
                        <div><label className="block text-xs font-black text-[#a0845c] uppercase mb-3">Category</label><div className="grid grid-cols-2 gap-3">{CATEGORIES.map(c => (<button key={c.name} type="button" onClick={() => setNewTaskCategory(c.name)} className={`p-3 rounded-xl border-2 transition-all text-sm font-bold ${newTaskCategory === c.name ? 'border-[#c4a77d] bg-[#c4a77d] text-white' : 'border-[#e8e0d5] bg-[#f5f0e8] text-[#a0845c]'}`}>{c.name}</button>))}</div></div>
                        <button type="submit" className="w-full py-3.5 bg-[#c4a77d] text-white rounded-xl font-bold hover:bg-[#a0845c] transition-colors">Create Template</button></form>
                    </div>
                </div>
            );

            const EditTaskModal = () => editingTask && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsEditModalOpen(false)}>
                    <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-6 bg-[#f5f0e8] border-b border-[#e8e0d5]"><h3 className="text-xl font-black text-[#2c3e2f]">Edit Template</h3></div>
                        <form onSubmit={handleEditTask} className="p-6 space-y-5"><input required value={newTaskName} onChange={(e) => setNewTaskName(e.target.value)} className="w-full bg-[#f5f0e8] border-2 border-[#e8e0d5] rounded-xl px-5 py-3.5 text-[#2c3e2f]" />
                        <div className="grid grid-cols-2 gap-3">{CATEGORIES.map(c => (<button key={c.name} type="button" onClick={() => setNewTaskCategory(c.name)} className={`p-3 rounded-xl border-2 text-sm font-bold ${newTaskCategory === c.name ? 'border-[#c4a77d] bg-[#c4a77d] text-white' : 'border-[#e8e0d5] bg-[#f5f0e8] text-[#a0845c]'}`}>{c.name}</button>))}</div>
                        <button type="submit" className="w-full py-3.5 bg-[#c4a77d] text-white rounded-xl font-bold hover:bg-[#a0845c] transition-colors">Save Changes</button></form>
                    </div>
                </div>
            );

            const ResetModal = () => (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setShowResetConfirm(false)}>
                    <div className="bg-white rounded-2xl max-w-md w-full p-6" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-black text-red-600 mb-3">Reset All Data?</h3>
                        <p className="text-[#2c3e2f] text-sm mb-6">This action cannot be undone. All your tasks and logs will be permanently deleted.</p>
                        <div className="flex gap-3"><button onClick={resetAllData} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold">Yes, Reset</button><button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-[#e8e0d5] text-[#2c3e2f] py-2.5 rounded-xl font-bold">Cancel</button></div>
                    </div>
                </div>
            );

            const LogEditModal = () => editingLog && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsLogEditModalOpen(false)}>
                    <div className="bg-white rounded-2xl max-w-md w-full" onClick={e => e.stopPropagation()}>
                        <div className="p-6 bg-[#f5f0e8] border-b border-[#e8e0d5]"><h3 className="text-xl font-black text-[#2c3e2f]">Edit Log Entry</h3></div>
                        <form onSubmit={saveEditedLog} className="p-6 space-y-5"><input type="date" required value={editLogDate} onChange={(e) => setEditLogDate(e.target.value)} className="w-full bg-[#f5f0e8] border-2 border-[#e8e0d5] rounded-xl px-5 py-3.5 text-[#2c3e2f]" /><input type="time" required value={editLogTime} onChange={(e) => setEditLogTime(e.target.value)} className="w-full bg-[#f5f0e8] border-2 border-[#e8e0d5] rounded-xl px-5 py-3.5 text-[#2c3e2f]" /><div className="flex gap-3"><button type="submit" className="flex-1 bg-[#c4a77d] text-white py-3 rounded-xl font-bold">Save</button><button type="button" onClick={() => setIsLogEditModalOpen(false)} className="flex-1 bg-[#e8e0d5] text-[#2c3e2f] py-3 rounded-xl font-bold">Cancel</button></div></form>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-[#f5f0e8] overflow-hidden">
                    <HamburgerButton />
                    <MobileSidebar />
                    <DesktopSidebar />

                    <main className="flex-1 overflow-y-auto">
                        <div className="max-w-6xl mx-auto p-5 md:p-8 lg:p-10 pt-16 md:pt-8">
                            <div className="mb-8">
                                <h1 className="text-2xl md:text-3xl font-black text-[#2c3e2f] tracking-tight">Task Tracker Dashboard</h1>
                                <p className="text-sm text-[#a0845c] font-semibold mt-1">Monitor your recurring activities with precision</p>
                            </div>

                            {activeTab === 'dashboard' && showTutorial && (
                                <div className="mb-8 p-4 bg-gradient-to-r from-[#c4a77d] to-[#a0845c] rounded-xl shadow-lg">
                                    <div className="bg-white rounded-lg p-5 flex items-center gap-5 flex-wrap">
                                        <CharacterAvatar className="w-14 h-14" imageData={avatarImage} />
                                        <div className="flex-1"><h2 className="font-black text-[#2c3e2f]">{tutorialStep === 0 ? "Welcome!" : tutorialStep === 1 ? "Create a Template" : tutorialStep === 2 ? "Log Your First Entry" : "Great Job!"}</h2><p className="text-sm text-[#a0845c]">{tutorialStep === 0 ? "Let's get started with your first task" : tutorialStep === 1 ? "Add something like 'Fill Gas' or 'Change Oil'" : tutorialStep === 2 ? "Select your task and click Add Entry" : "I'll start calculating your trends now!"}</p></div>
                                        {tutorialStep === 0 && <button onClick={() => setTutorialStep(1)} className="bg-[#c4a77d] text-white px-5 py-2 rounded-lg font-bold text-sm">Get Started →</button>}
                                        <button onClick={() => setShowTutorial(false)} className="text-[#c4a77d] text-sm font-bold">Hide</button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'templates' && <TemplatesView />}
                            {activeTab === 'history' && <HistoryView />}
                            {activeTab === 'settings' && <SettingsView />}
                        </div>
                    </main>

                    {isTaskModalOpen && <TaskModal />}
                    {isEditModalOpen && <EditTaskModal />}
                    {showResetConfirm && <ResetModal />}
                    {isLogEditModalOpen && <LogEditModal />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
